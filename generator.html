<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator Link Undangan</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Georgia', serif; }
  body { background: #1a1a1a; color: #f5f5f5; padding: 30px 20px; }
.container { background: rgba(212, 175, 55, 0.08); border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 20px; padding: 30px; max-width: 700px; margin: 0 auto; backdrop-filter: blur(10px); }
  h2 { color: #d4af37; margin-bottom: 15px; font-size: 1.8rem; text-align: center; }
  h3 { color: #d4af37; margin: 20px 0 10px; font-size: 1.3rem; }
  textarea { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #d4af37; border-radius: 12px; background: rgba(0,0,0,0.6); color: #fff; font-size: 1rem; outline: none; min-height: 200px; resize: vertical; font-family: monospace; }
.btn { background: linear-gradient(135deg, #d4af37, #f9e076); color: #1a1a1a; padding: 14px 30px; border: none; border-radius: 50px; font-size: 1.1rem; cursor: pointer; margin: 10px 5px; font-weight: bold; transition: 0.2s; }
.btn:active { transform: scale(0.97); }
.btn-danger { background: #ff4d4d; color: #fff; }
.btn-group { text-align: center; margin: 20px 0; display: flex; flex-wrap: wrap; justify-content: center; }
.result { margin-top: 25px; }
  table { width: 100%; border-collapse: collapse; margin-top: 15px; background: rgba(0,0,0,0.5); border-radius: 10px; overflow: hidden; }
  th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(212, 175, 55, 0.3); }
  th { background: rgba(212, 175, 55, 0.2); color: #d4af37; }
  td a { color: #d4af37; word-break: break-all; }
.copy-btn { background: transparent; border: 1px solid #d4af37; color: #d4af37; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
  label { color: #d4af37; font-size: 0.95rem; margin-top: 10px; display: block; }
.output-code { background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; margin-top: 15px; font-family: monospace; font-size: 0.85rem; overflow-x: auto; white-space: pre-wrap; }
.note { background: rgba(212, 175, 55, 0.15); padding: 12px; border-radius: 10px; margin-bottom: 15px; font-size: 0.9rem; }
</style>
</head>
<body>

<div class="container">
  <h2>Generator Link Undangan</h2>

  <div class="note">
    Foto prewedding otomatis pakai file <strong>foto.jpg</strong> di repo. 
    Tinggal paste daftar tamu, 1 nama per baris.
  </div>

  <label>Daftar Tamu</label>
  <textarea id="namaTamu" placeholder="Budi Santoso
Siti Aminah
Pak RT dan Keluarga"></textarea>

  <div class="btn-group">
    <button class="btn" onclick="generate()">Generate</button>
    <button class="btn btn-danger" onclick="clearAll()">Hapus Semua</button>
  </div>

  <div class="result" id="result" style="display:none;">
    <h3>Kode HTML untuk Halaman Foto</h3>
    <div class="output-code" id="outputHTML"></div>
    <button class="copy-btn" onclick="copyText(document.getElementById('outputHTML').innerText)">Copy Kode</button>

    <h3>Daftar Link Tamu - <span id="count">0</span> orang</h3>
    <table id="tableTamu">
      <thead><tr><th>No</th><th>Nama Tamu</th><th>Link Undangan</th><th>Action</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
let dataTamu = [];
const baseURL = window.location.origin + window.location.pathname.replace('generator.html', '');

window.onload = function() {
  dataTamu = JSON.parse(localStorage.getItem('dataTamu') || '[]');
  renderTable();
}

function generate() {
  const names = document.getElementById('namaTamu').value.trim().split('\n');
  dataTamu = [];

  names.forEach(name => {
    name = name.trim();
    if (name) dataTamu.push({ 
      nama: name, 
      link: baseURL + '?untuk=' + encodeURIComponent(name) 
    });
  });

  // Generate kode HTML pakai foto.jpg
  const fotoPrewed = baseURL + 'foto.jpg';
  const htmlCode = `<div class="page" id="page2">
  <div class="content">
    <img src="${fotoPrewed}" class="photo">
  </div>
</div>`;

  document.getElementById('outputHTML').innerText = htmlCode;
  document.getElementById('result').style.display = 'block';
  
  localStorage.setItem('dataTamu', JSON.stringify(dataTamu));
  renderTable();
}

function renderTable() {
  const tbody = document.querySelector(`#tableTamu tbody`);
  tbody.innerHTML = '';
  dataTamu.forEach((item, i) => {
    tbody.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${item.nama}</td>
        <td><a href="${item.link}" target="_blank">${item.link}</a></td>
        <td><button class="copy-btn" onclick="copyText('${item.link}')">Copy</button></td>
      </tr>
    `;
  });
  document.getElementById('count').innerText = dataTamu.length;
}

function clearAll() {
  if (!confirm('Hapus semua data?')) return;
  dataTamu = [];
  localStorage.removeItem('dataTamu');
  document.getElementById('namaTamu').value = '';
  document.getElementById('outputHTML').innerText = '';
  renderTable();
  document.getElementById('result').style.display = 'none';
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => alert('Copied!'));
}
</script>
</body>
       </html>
